name: generate-and-upload-card

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      
      - name: generate github stats card
        uses: LuciNyan/pixel-profile/action@main
        with:
          crt_outputs: |
            pixel-profile-crt.svg?username=lorocks51987&include_all_commits=true
            
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "Gerando Pixel Profile CRT"; then
            git push
          fi
